<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M13 實體通道硬核解鎖</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #1c1c1e; color: white; padding: 10px; }
        .container { background: #2c2c2e; padding: 15px; border-radius: 10px; width: 90%; max-width: 500px; margin: 20px auto; }
        select { width: 90%; padding: 12px; font-size: 16px; border-radius: 8px; background-color: #3a3a3c; color: white; margin-bottom: 15px; }
        video { width: 100%; height: auto; border-radius: 5px; background-color: black; }
        button { background-color: #007aff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 10px; font-weight: bold; width: 90%; }
        #status { color: #ff9500; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>單鏡頭獨立通道切換測試</h1>
    <p>【全實體硬體規格綑綁版】</p>
    <div id="status">請先點擊下方按鈕讀取硬體清單</div>
    
    <button id="initBtn" onclick="initDeviceList()">1. 讀取並列出所有鏡頭</button>

    <div class="container">
        <label for="cameraSelect">目前選擇硬體：</label>
        <select id="cameraSelect" disabled>
            <option>請先讀取鏡頭...</option>
        </select>
        <video id="mainVideo" autoplay playsinline></video>
    </div>

    <script>
        let currentStream = null;

        async function initDeviceList() {
            const statusDiv = document.getElementById('status');
            const select = document.getElementById('cameraSelect');
            statusDiv.innerText = "正在請求相機與語音權限...";
            try {
                // 強制同時索取音訊與視訊實體權限
                await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(device => device.kind === 'videoinput');
                select.innerHTML = '';
                
                videoDevices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `未命名硬體鏡頭 ${index + 1}`;
                    select.appendChild(option);
                });
                select.disabled = false;
                statusDiv.innerText = `成功抓到 ${videoDevices.length} 個硬體設備！`;
                select.onchange = () => startSingleCamera(select.value);
                startSingleCamera(videoDevices[0].deviceId);
            } catch (err) {
                statusDiv.innerText = "權限遭拒，或無法取得鏡頭清單。";
            }
        }

        async function startSingleCamera(deviceId) {
            const video = document.getElementById('mainVideo');
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "正在掐斷舊通道...";

            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
                video.srcObject = null;
            }

            await new Promise(resolve => setTimeout(resolve, 600)); // 延長緩衝到0.6秒，給硬體充足時間

            // 【終極改動】：灌入最完整的實體音道、聲學參數與影像硬體指標
            const constraints = {
                audio: {
                    echoCancellation: { exact: true }, // 強制實體硬體回音消除
                    noiseSuppression: { exact: true }, // 強制實體降噪
                    autoGainControl: { exact: true },  // 強制自動增益
                    channelCount: { exact: 1 },         // 強制單聲道（標準通話音道）
                    sampleRate: { ideal: 48000 },      // 注入標準高音質通話取樣率 (48kHz)
                    sampleSize: { ideal: 16 }          // 16位元實體音訊深度
                },
                video: {
                    deviceId: { exact: deviceId },
                    // 塞入標準通話的實體影像寬高比例（不限制死，用推薦制，但綁定會議標籤）
                    aspectRatio: { ideal: 1.7777777778 }, // 16:9 實體寬高比
                    frameRate: { ideal: 30 }
                }
            };

            statusDiv.innerText = "正在強行突進實體通道...";

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                statusDiv.innerText = "【成功】已強行突進實體通道！畫面輸出中。";
            } catch (err) {
                console.error(err);
                statusDiv.innerText = `突進失敗。錯誤: ${err.name} (底層拒絕交出實體控制權)`;
            }
        }
    </script>
</body>
</html>
